name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  # ─── Job 1: Lint ────────────────────────────────────────────────────────────
  lint:
    name: Lint (clang-format + cppcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang-format-14 cppcheck

      - name: clang-format check
        run: |
          find src include -name '*.cpp' -o -name '*.h' | \
          xargs clang-format-14 --dry-run --Werror

      - name: cppcheck
        run: |
          cppcheck --enable=all --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --suppress=unmatchedSuppression \
            -I include/ src/ 2>&1

  # ─── Job 2: Testes unitários (x86_64, mock SDI) ─────────────────────────────
  test-unit:
    name: Unit Tests (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.28"

      - name: Configure
        run: |
          cmake -S . -B build/test \
            -DBUILD_TESTS=ON \
            -DUSE_SDI_MOCK=ON \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="--coverage"

      - name: Build
        run: cmake --build build/test -- -j$(nproc)

      - name: Run tests
        run: |
          cd build/test
          ctest --output-on-failure --timeout 30

      - name: Coverage report
        run: |
          sudo apt-get install -y lcov
          lcov --capture --directory build/test --output-file coverage.info
          lcov --remove coverage.info '*/googletest/*' '*/tests/*' \
               --output-file coverage_filtered.info
          lcov --list coverage_filtered.info

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage_filtered.info
        continue-on-error: true

  # ─── Job 3: Build Android arm64-v8a ─────────────────────────────────────────
  build-android:
    name: Build Android arm64-v8a
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache NDK
        uses: actions/cache@v4
        with:
          path: ${{ runner.tool_cache }}/ndk/26.2.11394342
          key: ndk-r26b

      - name: Install NDK r26b
        run: |
          NDK_DIR="${RUNNER_TOOL_CACHE}/ndk/26.2.11394342"
          if [[ ! -d "${NDK_DIR}" ]]; then
            wget -q "https://dl.google.com/android/repository/android-ndk-r26b-linux.zip" -O /tmp/ndk.zip
            unzip -q /tmp/ndk.zip -d "${RUNNER_TOOL_CACHE}/ndk"
            mv "${RUNNER_TOOL_CACHE}/ndk/android-ndk-r26b" "${NDK_DIR}"
          fi
          echo "ANDROID_NDK_HOME=${NDK_DIR}" >> $GITHUB_ENV

      - name: Configure
        run: |
          cmake -S . -B build/android \
            -DCMAKE_TOOLCHAIN_FILE="${ANDROID_NDK_HOME}/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-28 \
            -DANDROID_STL=c++_shared \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo
        # NOTA: libs/arm64-v8a/ requer as bibliotecas Verifone (acesso restrito).
        # Esta etapa compilará apenas os fontes disponíveis no repositório.

      - name: Build
        run: cmake --build build/android -- -j$(nproc)

      - name: Verify artifact
        run: |
          if [[ -f "build/android/libppcomp.so" ]]; then
            ls -lh build/android/libppcomp.so
            echo "=== Símbolos PP_* exportados: ==="
            nm build/android/libppcomp.so | grep " T PP_" || echo "(nenhum ainda)"
          else
            echo "libppcomp.so não gerada (esperado enquanto fontes estão pendentes)"
          fi

  # ─── Job 4: Security check ───────────────────────────────────────────────────
  security-check:
    name: Security Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install semgrep
        run: pip install semgrep

      - name: Semgrep scan (buffer overflows, format strings)
        run: |
          semgrep --config=p/c --error \
            --exclude=tests/ --exclude=mocks/ \
            src/ include/ || true
        # 'true' enquanto não há implementação — remover quando houver código

      - name: Check for sensitive symbol names in source
        run: |
          echo "=== Verificando strings sensíveis no código fonte ==="
          if grep -rn --include='*.cpp' --include='*.h' \
               -E 'pan_plain|pin_plain|track_clear|LOG.*PAN|LOG.*PIN' \
               src/ include/ 2>/dev/null; then
            echo "ERRO: Dados sensíveis encontrados no código!"
            exit 1
          fi
          echo "OK: Nenhum dado sensível encontrado."

      - name: Check binary for sensitive strings (if built)
        run: |
          if [[ -f "build/android/libppcomp.so" ]]; then
            if strings build/android/libppcomp.so | grep -iE "PAN|pin_plain|track_clear"; then
              echo "ERRO: Strings sensíveis encontradas no binário!"
              exit 1
            fi
            echo "OK: Nenhuma string sensível no binário."
          fi
